name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Opt in to Node.js 24 for javascript actions ahead of GitHub's June 2026
# deprecation of Node.js 20 in hosted actions.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: Run tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    permissions:
      # Required by python-coverage-comment-action to store the coverage report
      contents: write
      pull-requests: write

    steps:
      - name: Free Disk Space
        uses: endersonmenezes/free-disk-space@v3
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          rm_cmd: "rmz"  # Faster cleanup

      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: "${{ matrix.python-version }}"

      - name: Install Poetry
        run: pip install "poetry>=2.0,<3"

      - name: Configure Poetry virtualenv
        run: poetry config virtualenvs.in-project true

      - name: Cache virtualenv
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: .venv
          # Invalidate when poetry.lock changes.
          key: venv-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('poetry.lock') }}

      - name: Install dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        # No --with/--only/--without flags — project uses PEP 735
        # [dependency-groups], which Poetry 2.x handles with a bare
        # `poetry install` (dev group installed by default).
        run: poetry install --no-interaction

      - name: Install dbus-run-session for D-Bus integration tests
        run: sudo apt-get install -y --no-install-recommends dbus

      - name: Run unit tests (no D-Bus)
        run: |
          poetry run pytest \
            tests/core \
            tests/plugins \
            tests/daemon/test_http.py \
            tests/daemon/test_plugin_manager_discovery.py \
            tests/daemon/test_plugin_manager_lifecycle.py

      - name: Run D-Bus integration tests under a private session bus
        run: |
          dbus-run-session -- poetry run pytest \
            tests/daemon/test_service_core.py \
            tests/integration

      - name: Upload coverage report
        if: always() && matrix.python-version == '3.13'
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COVERAGE_DATA_FILE: .cache/.coverage
